name: Laravel Pint

on:
  push:
    branches:
      - master

jobs:
  pint:
    name: Fix Code Style
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      COMPOSER_NO_INTERACTION: 1

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3
        coverage: none
        tools: composer:v2

    - name: Install dependencies
      run: |
        composer update --prefer-dist --no-suggest --no-progress

    - run: ./vendor/bin/pint
      continue-on-error: true

    - run: git checkout -- composer.json

    - uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: laravel-pint
        commit_author: azure-client-credentials <azure-client-credentials@users.noreply.github.com>
